version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    expose:
      - "8000"
    volumes:
      - db_data:/app/data
    environment:
      - API_TOKEN=Dav0mat@API#2026!
      - DB_FILE=/app/data/davomat.db

  hikvision:
    build:
      context: .
      dockerfile: Dockerfile.hikvision
    restart: always
    ports:
      - "6610:6610"
    volumes:
      - db_data:/app/data
    environment:
      - DB_FILE=/app/data/davomat.db
      - PYTHONUNBUFFERED=1

  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  db_data:
