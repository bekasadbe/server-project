# HTTP → HTTPS redirect
server {
    listen 80;
    server_name davomatlar.uz;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name davomatlar.uz;

    ssl_certificate     /etc/letsencrypt/live/davomatlar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davomatlar.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
